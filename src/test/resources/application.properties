spring.application.name=order-processing-shipments

jwt.secret=${JWT_SECRET_TEST}
jwt.expiration=${JWT_EXPIRATION}

# disabling; REST services only here
spring.jpa.open-in-view=false

# ship props
orders.demo.ship.page-size=50
orders.demo.ship.max-page-size=50
orders.demo.ship.shipment-sorting-attribute=shipped,desc
orders.demo.ship.fulfillment-sorting-attribute=created,desc

# Test Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.hibernate.stat=DEBUG

# Enable Flyway SQL + info logging
logging.level.org.flywaydb.core=INFO
logging.level.org.flywaydb.core.internal=DEBUG
